<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Light Simulator</title>
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <h1>Traffic Light Simulator</h1>

  <div id="traffic-light">
    <div class="bulb" id="red"></div>
    <div class="bulb" id="amber"></div>
    <div class="bulb" id="green"></div>
  </div>

  <div class="buttons">
    <button onclick="nextLight()">Next Light</button>
    <button onclick="toggleAuto()" id="auto-button">Start/Stop Auto</button>
  </div>

</body>
<script src="script.js"></script>
</html>
